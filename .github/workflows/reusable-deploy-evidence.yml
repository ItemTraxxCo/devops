name: Reusable Deploy Evidence

# Thin wrapper over actions/collect-deploy-evidence for spokes that prefer
# workflow_call. ItemTraxx-App checks this public repo out and uses the
# composite action directly.

permissions: {}

on:
  workflow_call:
    inputs:
      run_id:
        description: ID of the completed deploy workflow run.
        required: true
        type: string
      sha:
        description: Deployed commit SHA.
        required: true
        type: string
      workflow_name:
        description: Name of the deploy workflow.
        required: false
        type: string
        default: unknown
      surfaces:
        description: Comma-separated deploy surfaces (e.g. supabase-functions, cloudflare-worker, vercel-spa).
        required: false
        type: string
        default: unknown
      health_url:
        description: Health endpoint probed as part of the evidence bundle.
        required: false
        type: string
        default: https://edge.itemtraxx.com/functions/system-status
      origin:
        description: Origin header for the health probe.
        required: false
        type: string
        default: https://itemtraxx.com
      hub_ref:
        description: Deprecated compatibility input; hub actions are always checked out from the pinned revision.
        required: false
        type: string
        default: main
    secrets:
      AI_API_KEY:
        required: false

jobs:
  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout devops hub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ItemTraxxCo/devops
          # Do not execute a caller-supplied ref in this workflow: callers can
          # otherwise select arbitrary action code. Update this SHA only as a
          # reviewed hub release.
          ref: 4fd58daee1a0fccde29ffc9c896d07ea21e731ab
          persist-credentials: false

      - name: Build deploy evidence bundle
        uses: ./actions/collect-deploy-evidence
        with:
          run_id: ${{ inputs.run_id }}
          repository: ${{ github.repository }}
          sha: ${{ inputs.sha }}
          github_token: ${{ github.token }}
          workflow_name: ${{ inputs.workflow_name }}
          surfaces: ${{ inputs.surfaces }}
          health_url: ${{ inputs.health_url }}
          origin: ${{ inputs.origin }}
          ai_api_key: ${{ secrets.AI_API_KEY }}
