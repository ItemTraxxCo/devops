name: Reusable PR Risk Review

# Thin wrapper over actions/pr-risk-review for private spoke repos that can
# use workflow_call. Public spokes check out this repo with
# DEVOPS_HUB_TOKEN and use the composite action directly.

permissions: {}

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to review.
        required: true
        type: string
      max_diff_bytes:
        description: Maximum diff bytes to send to the AI reviewer.
        required: false
        type: string
        default: "300000"
      apply_labels:
        description: Apply risk:* labels to the PR.
        required: false
        type: boolean
        default: true
    secrets:
      AI_API_KEY:
        required: false

jobs:
  risk-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Run PR risk review
        uses: ItemTraxxCo/devops/actions/pr-risk-review@main
        with:
          pr_number: ${{ inputs.pr_number }}
          repository: ${{ github.repository }}
          github_token: ${{ github.token }}
          ai_api_key: ${{ secrets.AI_API_KEY }}
          apply_labels: ${{ inputs.apply_labels }}
          max_diff_bytes: ${{ inputs.max_diff_bytes }}
