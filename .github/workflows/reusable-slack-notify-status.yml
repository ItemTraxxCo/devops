name: Reusable Slack Notify Status

permissions:
  actions: read
  contents: read

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
      workflow_name:
        required: true
        type: string
      job_name:
        required: true
        type: string
      run_url:
        required: true
        type: string
      ref_name:
        required: true
        type: string
      sha:
        required: true
        type: string
      status:
        required: false
        type: string
      status_message:
        required: false
        type: string
      slack_channel_id:
        required: false
        type: string
      slack_message_ts:
        required: false
        type: string
      incident_alerts_enabled:
        required: false
        type: boolean
        default: true
    outputs:
      slack_channel_id:
        description: Slack channel used for the status message.
        value: ${{ jobs.notify_start.outputs.slack_channel_id }}
      slack_message_ts:
        description: Slack timestamp for the posted status message.
        value: ${{ jobs.notify_start.outputs.slack_message_ts }}
    secrets:
      SLACK_BOT_TOKEN:
        required: false
      SLACK_CHANNEL_ID:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      INCIDENT_IO_WEBHOOK_URL:
        required: false
      INCIDENT_IO_WEBHOOK_TOKEN:
        required: false

jobs:
  notify_start:
    if: ${{ inputs.mode == 'start' }}
    runs-on: ubuntu-latest
    outputs:
      slack_channel_id: ${{ steps.post.outputs.channel_id }}
      slack_message_ts: ${{ steps.post.outputs.message_ts }}
    steps:
      - name: Post Slack start notification
        id: post
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          JOB_NAME: ${{ inputs.job_name }}
          RUN_URL: ${{ inputs.run_url }}
          REF_NAME: ${{ inputs.ref_name }}
          SHA: ${{ inputs.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          send_webhook_fallback() {
            if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
              PAYLOAD="$(jq -n \
                --arg workflow "$WORKFLOW_NAME" \
                --arg job "$JOB_NAME" \
                --arg branch "$REF_NAME" \
                --arg commit "${SHA:0:7}" \
                --arg run_url "$RUN_URL" \
                --arg repo "$REPOSITORY" \
                '{
                  text: ("GitHub Actions run started: " + $workflow + " / " + $job),
                  attachments: [
                    {
                      color: "#d4a017",
                      fields: [
                        { title: "Status", value: "In progress", short: true },
                        { title: "Commit", value: ($commit + " (" + $branch + ")"), short: true },
                        { title: "Workflow", value: ("<" + $run_url + "|" + $workflow + " / " + $job + ">"), short: false },
                        { title: "Repository", value: $repo, short: false }
                      ],
                      footer: "GitHub Actions"
                    }
                  ]
                }')"
              curl -fsSL -X POST "$SLACK_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                --data "$PAYLOAD"
            else
              echo "No Slack secrets configured; skipping start notification."
            fi
          }

          if [ -n "${SLACK_BOT_TOKEN:-}" ] && [ -n "${SLACK_CHANNEL_ID:-}" ]; then
            PAYLOAD="$(jq -n \
              --arg channel "$SLACK_CHANNEL_ID" \
              --arg workflow "$WORKFLOW_NAME" \
              --arg job "$JOB_NAME" \
              --arg branch "$REF_NAME" \
              --arg commit "${SHA:0:7}" \
              --arg repo "$REPOSITORY" \
              --arg run_url "$RUN_URL" \
              '{
                channel: $channel,
                text: "GitHub Actions run started",
                attachments: [
                  {
                    color: "#d4a017",
                    fields: [
                      { title: "Status", value: "In progress", short: true },
                      { title: "Commit", value: ($commit + " (" + $branch + ")"), short: true },
                      { title: "Workflow", value: ("<" + $run_url + "|" + $workflow + " / " + $job + ">"), short: false },
                      { title: "Repository", value: $repo, short: false }
                    ],
                    footer: "GitHub Actions"
                  }
                ]
              }')"
            RESPONSE="$(curl -fsSL https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-Type: application/json; charset=utf-8" \
              --data "$PAYLOAD")"
            OK="$(printf '%s' "$RESPONSE" | jq -r '.ok')"
            if [ "$OK" != "true" ]; then
              echo "Slack bot post failed, falling back to webhook: $RESPONSE"
              send_webhook_fallback
              exit 0
            fi
            echo "channel_id=$(printf '%s' "$RESPONSE" | jq -r '.channel // empty')" >> "$GITHUB_OUTPUT"
            echo "message_ts=$(printf '%s' "$RESPONSE" | jq -r '.ts // empty')" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          send_webhook_fallback

  incidentio-notify-start-failure:
    needs:
      - notify_start
    if: ${{ always() && inputs.incident_alerts_enabled && inputs.mode == 'start' && (needs.notify_start.result == 'failure' || needs.notify_start.result == 'cancelled') }}
    uses: ItemTraxxCo/devops/.github/workflows/reusable-incident-alert.yml@main
    with:
      status: ${{ needs.notify_start.result }}
      severity: high
      workflow_name: Reusable Slack Notify Status
      job_name: notify_start
      run_url: ${{ inputs.run_url }}
      repository: ${{ github.repository }}
      branch: ${{ inputs.ref_name }}
      sha: ${{ inputs.sha }}
      environment: production
    secrets:
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  notify_finish:
    if: ${{ inputs.mode == 'finish' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack finish notification
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          JOB_NAME: ${{ inputs.job_name }}
          RUN_URL: ${{ inputs.run_url }}
          REF_NAME: ${{ inputs.ref_name }}
          SHA: ${{ inputs.sha }}
          STATUS: ${{ inputs.status || 'completed' }}
          STATUS_MESSAGE: ${{ inputs.status_message }}
          MESSAGE_TS: ${{ inputs.slack_message_ts }}
          MESSAGE_CHANNEL_ID: ${{ inputs.slack_channel_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          RUN_ID="$(printf '%s' "$RUN_URL" | awk -F/ '{print $NF}')"
          INPUT_STATUS_LOWER="$(printf '%s' "$STATUS" | tr '[:upper:]' '[:lower:]')"
          if [ "$INPUT_STATUS_LOWER" != "skipped" ] && [ -n "${GITHUB_TOKEN:-}" ] && [ -n "${RUN_ID:-}" ]; then
            RUN_RESPONSE="$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPOSITORY}/actions/runs/${RUN_ID}" || true)"
            RUN_CONCLUSION="$(printf '%s' "$RUN_RESPONSE" | jq -r '.conclusion // empty' 2>/dev/null || true)"
            if [ -n "$RUN_CONCLUSION" ]; then
              STATUS="$RUN_CONCLUSION"
            fi
          fi

          STATUS_LOWER="$(printf '%s' "$STATUS" | tr '[:upper:]' '[:lower:]')"
          case "$STATUS_LOWER" in
            success)
              STATUS_LABEL='Succeeded'
              ;;
            failure)
              STATUS_LABEL='Failed'
              ;;
            cancelled)
              STATUS_LABEL='Cancelled'
              ;;
            skipped)
              STATUS_LABEL='Skipped'
              ;;
            *)
              STATUS_LABEL='Completed'
              ;;
          esac

          if [ -z "${SLACK_BOT_TOKEN:-}" ] || [ -z "${MESSAGE_CHANNEL_ID:-}" ] || [ -z "${MESSAGE_TS:-}" ]; then
            echo "No Slack bot update target available; skipping finish notification to avoid posting a duplicate standalone message."
            exit 0
          fi

          PAYLOAD="$(jq -n \
            --arg channel "$MESSAGE_CHANNEL_ID" \
            --arg ts "$MESSAGE_TS" \
            --arg workflow "$WORKFLOW_NAME" \
            --arg job "$JOB_NAME" \
            --arg branch "$REF_NAME" \
            --arg commit "${SHA:0:7}" \
            --arg repo "$REPOSITORY" \
            --arg run_url "$RUN_URL" \
            --arg status_label "$STATUS_LABEL" \
            --arg status_message "$STATUS_MESSAGE" \
            '{
              channel: $channel,
              ts: $ts,
              text: ("GitHub Actions run " + ($status_label | ascii_downcase)),
              attachments: [
                {
                  color: (
                    if ($status_label == "Succeeded") then "#2eb67d"
                    elif ($status_label == "Failed") then "#e01e5a"
                    elif ($status_label == "Cancelled") then "#9ca3af"
                    else "#d4a017"
                    end
                  ),
                  fields: [
                    { title: "Status", value: $status_label, short: true },
                    { title: "Commit", value: ($commit + " (" + $branch + ")"), short: true },
                    if ($status_message != "") then { title: "Message", value: $status_message, short: false } else empty end,
                    { title: "Workflow", value: ("<" + $run_url + "|" + $workflow + " / " + $job + ">"), short: false },
                    { title: "Repository", value: $repo, short: false }
                  ],
                  footer: "GitHub Actions"
                }
              ]
            }')"
          RESPONSE="$(curl -fsSL https://slack.com/api/chat.update \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$PAYLOAD")"
          OK="$(printf '%s' "$RESPONSE" | jq -r '.ok')"
          if [ "$OK" != "true" ]; then
            echo "Slack bot update failed; skipping webhook fallback to avoid posting a duplicate standalone message: $RESPONSE"
            exit 0
          fi

  incidentio-notify-finish-failure:
    needs:
      - notify_finish
    if: ${{ always() && inputs.incident_alerts_enabled && inputs.mode == 'finish' && (needs.notify_finish.result == 'failure' || needs.notify_finish.result == 'cancelled') }}
    uses: ItemTraxxCo/devops/.github/workflows/reusable-incident-alert.yml@main
    with:
      status: ${{ needs.notify_finish.result }}
      severity: high
      workflow_name: Reusable Slack Notify Status
      job_name: notify_finish
      run_url: ${{ inputs.run_url }}
      repository: ${{ github.repository }}
      branch: ${{ inputs.ref_name }}
      sha: ${{ inputs.sha }}
      environment: production
    secrets:
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}
