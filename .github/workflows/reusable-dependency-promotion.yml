name: Reusable Dependency Promotion

# Thin wrapper over actions/dependabot-promotion for spokes that prefer
# workflow_call. ItemTraxx-App checks this public repo out and uses the
# composite action directly.

permissions: {}

on:
  workflow_call:
    inputs:
      pr_number:
        description: Dependabot pull request number.
        required: true
        type: string
      enable_automerge:
        description: Enable GitHub auto-merge (squash) for safe candidates instead of only labeling.
        required: false
        type: boolean
        default: false
      allowed_update_types:
        description: Comma-separated semver update types that qualify as safe.
        required: false
        type: string
        default: "version-update:semver-patch,version-update:semver-minor"
      hub_ref:
        description: DevOps hub ref to checkout before running the local action.
        required: false
        type: string
        default: main

jobs:
  promote:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout devops hub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ItemTraxxCo/devops
          ref: ${{ inputs.hub_ref }}
          persist-credentials: false

      - name: Run dependency promotion
        uses: ./actions/dependabot-promotion
        with:
          pr_number: ${{ inputs.pr_number }}
          repository: ${{ github.repository }}
          github_token: ${{ github.token }}
          enable_automerge: ${{ inputs.enable_automerge }}
          allowed_update_types: ${{ inputs.allowed_update_types }}
