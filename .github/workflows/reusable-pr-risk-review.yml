name: Reusable PR Risk Review

# Thin wrapper over actions/pr-risk-review for spokes that prefer
# workflow_call. ItemTraxx-App checks this public repo out and uses the
# composite action directly.

permissions: {}

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to review.
        required: true
        type: string
      max_diff_bytes:
        description: Maximum diff bytes to send to the AI reviewer.
        required: false
        type: string
        default: "300000"
      apply_labels:
        description: Apply risk:* labels to the PR.
        required: false
        type: boolean
        default: true
    secrets:
      AI_API_KEY:
        required: false

jobs:
  risk-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout devops hub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ItemTraxxCo/devops
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Run PR risk review
        uses: ./actions/pr-risk-review
        with:
          pr_number: ${{ inputs.pr_number }}
          repository: ${{ github.repository }}
          github_token: ${{ github.token }}
          ai_api_key: ${{ secrets.AI_API_KEY }}
          apply_labels: ${{ inputs.apply_labels }}
          max_diff_bytes: ${{ inputs.max_diff_bytes }}
