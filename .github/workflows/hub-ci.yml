name: Hub CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.7"
          curl -fsSL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          /tmp/actionlint -color

  check-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Syntax-check all scripts
        run: |
          set -euo pipefail
          FAILED=0
          while IFS= read -r -d '' FILE; do
            if ! node --check "$FILE"; then
              echo "Syntax error in $FILE"
              FAILED=1
            fi
          done < <(find scripts -name '*.mjs' -print0)
          exit "$FAILED"

      - name: Validate probe configs
        run: |
          set -euo pipefail
          for CONFIG in config/*-probes.json; do
            node scripts/probes/run-probes.mjs --validate "$CONFIG"
          done

      - name: Check prompt templates exist
        run: |
          set -euo pipefail
          for PROMPT in pr-risk-review workflow-failure-triage deploy-impact-summary; do
            test -s "prompts/${PROMPT}.md" || { echo "Missing prompt: prompts/${PROMPT}.md"; exit 1; }
          done

      - name: Validate policy config
        run: |
          set -euo pipefail
          jq empty config/policy.json
