name: Reusable CI Triage

# Thin wrapper over actions/ci-triage for spokes that prefer
# workflow_call. ItemTraxx-App checks this public repo out and uses the
# composite action directly. Hub docs live in the private internal-docs repo
# under docs/devops/architecture/hub-and-spoke.md.

permissions: {}

on:
  workflow_call:
    inputs:
      run_id:
        description: ID of the failed workflow run to triage.
        required: true
        type: string
      workflow_name:
        description: Name of the failed workflow (for reporting).
        required: false
        type: string
        default: unknown
      send_slack:
        description: Post the triage summary to Slack when a webhook is configured.
        required: false
        type: boolean
        default: true
      max_failed_jobs:
        description: Maximum number of failed jobs to pull logs for.
        required: false
        type: string
        default: "3"
      hub_ref:
        description: Deprecated compatibility input; hub actions are always checked out from the pinned revision.
        required: false
        type: string
        default: main
    secrets:
      AI_API_KEY:
        required: false
      SLACK_WEBHOOK_URL:
        required: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout devops hub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ItemTraxxCo/devops
          # Do not execute a caller-supplied ref in this workflow: callers can
          # otherwise select arbitrary action code. Update this SHA only as a
          # reviewed hub release.
          ref: 4fd58daee1a0fccde29ffc9c896d07ea21e731ab
          persist-credentials: false

      - name: Run CI triage
        uses: ./actions/ci-triage
        with:
          run_id: ${{ inputs.run_id }}
          repository: ${{ github.repository }}
          github_token: ${{ github.token }}
          ai_api_key: ${{ secrets.AI_API_KEY }}
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          send_slack: ${{ inputs.send_slack }}
          max_failed_jobs: ${{ inputs.max_failed_jobs }}
