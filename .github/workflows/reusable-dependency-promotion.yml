name: Reusable Dependency Promotion

# Thin wrapper over actions/dependabot-promotion for private spoke repos
# that can use workflow_call. Public spokes check out this repo with
# DEVOPS_HUB_TOKEN and use the composite action directly.

permissions: {}

on:
  workflow_call:
    inputs:
      pr_number:
        description: Dependabot pull request number.
        required: true
        type: string
      enable_automerge:
        description: Enable GitHub auto-merge (squash) for safe candidates instead of only labeling.
        required: false
        type: boolean
        default: false
      allowed_update_types:
        description: Comma-separated semver update types that qualify as safe.
        required: false
        type: string
        default: "version-update:semver-patch,version-update:semver-minor"

jobs:
  promote:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Run dependency promotion
        uses: ItemTraxxCo/devops/actions/dependabot-promotion@main
        with:
          pr_number: ${{ inputs.pr_number }}
          repository: ${{ github.repository }}
          github_token: ${{ github.token }}
          enable_automerge: ${{ inputs.enable_automerge }}
          allowed_update_types: ${{ inputs.allowed_update_types }}
