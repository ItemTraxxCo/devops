name: Reusable CI Triage

# Thin wrapper over actions/ci-triage for spokes that prefer
# workflow_call. ItemTraxx-App checks this public repo out and uses the
# composite action directly (see docs/architecture/hub-and-spoke.md).

permissions: {}

on:
  workflow_call:
    inputs:
      run_id:
        description: ID of the failed workflow run to triage.
        required: true
        type: string
      workflow_name:
        description: Name of the failed workflow (for reporting).
        required: false
        type: string
        default: unknown
      send_slack:
        description: Post the triage summary to Slack when a webhook is configured.
        required: false
        type: boolean
        default: true
      max_failed_jobs:
        description: Maximum number of failed jobs to pull logs for.
        required: false
        type: string
        default: "3"
    secrets:
      AI_API_KEY:
        required: false
      SLACK_WEBHOOK_URL:
        required: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Run CI triage
        uses: ItemTraxxCo/devops/actions/ci-triage@main
        with:
          run_id: ${{ inputs.run_id }}
          repository: ${{ github.repository }}
          github_token: ${{ github.token }}
          ai_api_key: ${{ secrets.AI_API_KEY }}
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          send_slack: ${{ inputs.send_slack }}
          max_failed_jobs: ${{ inputs.max_failed_jobs }}
